<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00C853">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Real FC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Real FC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00C853;--green-dim:#00963e;--surface:#0a150a;--card:rgba(18,36,18,0.92);
  --border:#2a3f2a;--text:#e8f5e9;--muted:#7a9b7a;--red:#ff4444;
  --gold:#ffd700;--blue:#4fc3f7;--radius:10px;
}
body{background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.bg-field{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;object-fit:cover;opacity:0.18;z-index:0;pointer-events:none}
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem;position:relative;z-index:1;min-height:100vh;background:linear-gradient(180deg,rgba(10,21,10,0.7) 0%,rgba(10,21,10,0.85) 100%)}
.auth-logo h1{font-family:'Bebas Neue',sans-serif;font-size:3.8rem;color:var(--green);letter-spacing:6px;text-align:center;text-shadow:0 0 30px rgba(0,200,83,0.4)}
.auth-logo p{color:var(--muted);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:4px}
.auth-card{background:rgba(18,36,18,0.95);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px;backdrop-filter:blur(10px)}
.tab-row{display:flex;gap:4px;background:var(--surface);border-radius:8px;padding:4px;margin-bottom:1.5rem}
.tab-btn{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;transition:all .2s;background:transparent;color:var(--muted)}
.tab-btn.active{background:var(--green);color:#000}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.field label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.field input,.field select,.field textarea{background:rgba(10,21,10,0.8);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;transition:border-color .2s;outline:none;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;transition:all .15s}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:#00e65c;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);padding:6px 10px}
.btn-full{width:100%}
.btn-sm{padding:5px 10px;font-size:.78rem}
.header{background:rgba(18,36,18,0.95);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--green);letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#000}
.nav{background:rgba(18,36,18,0.97);border-top:1px solid var(--border);display:flex;position:sticky;bottom:0;z-index:100;backdrop-filter:blur(10px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;color:var(--muted);font-size:.7rem;font-weight:500;border:none;background:transparent;transition:color .2s}
.nav-item.active{color:var(--green)}
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;backdrop-filter:blur(8px)}
.card-title{font-weight:600;font-size:.95rem}
.card-sub{font-size:.78rem;color:var(--muted);margin-top:2px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;backdrop-filter:blur(8px);transition:border-color .2s}
.match-card:hover{border-color:var(--green-dim)}
.match-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.match-date{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);letter-spacing:1px}
.match-time{font-size:.78rem;color:var(--muted)}
.match-status{font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.status-open{background:rgba(0,200,83,.15);color:var(--green)}
.status-closed{background:rgba(255,68,68,.15);color:var(--red)}
.status-played{background:rgba(79,195,247,.15);color:var(--blue)}
.match-body{padding:0 16px 14px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.match-stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.match-stat{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted)}
.match-actions{display:flex;gap:8px;flex-wrap:wrap}
.score-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.score-row:last-child{border-bottom:none}
.score-rank{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--muted);width:28px;text-align:center}
.score-rank.top{color:var(--gold)}
.score-av{width:36px;height:36px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#000;flex-shrink:0}
.score-info{flex:1;min-width:0}
.score-name{font-weight:500;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-detail{font-size:.72rem;color:var(--muted)}
.score-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--green)}
.score-bar{height:3px;background:var(--border);border-radius:2px;margin-top:4px}
.score-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green-dim),var(--green))}
.alert{padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:12px}
.alert-error{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.alert-success{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:var(--green)}
.badge{background:var(--green);color:#000;border-radius:4px;padding:2px 6px;font-size:.7rem;font-weight:700;text-transform:uppercase}
.badge-admin{background:var(--gold)}
.badge-blue{background:var(--blue);color:#000}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:.72rem;font-weight:500}
.chip-green{background:rgba(0,200,83,.12);color:var(--green)}
.chip-red{background:rgba(255,68,68,.12);color:var(--red)}
.chip-blue{background:rgba(79,195,247,.12);color:var(--blue)}
.chip-gold{background:rgba(255,215,0,.12);color:var(--gold)}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:.9rem;position:relative;z-index:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.switch-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.sw{position:relative;width:44px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.2s}
.sw-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
.sw input:checked+.sw-slider{background:var(--green)}
.sw input:checked+.sw-slider:before{transform:translateX(20px)}
.type-options{display:flex;gap:8px;margin-bottom:12px}
.type-opt{flex:1;padding:10px 6px;border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:.78rem;transition:all .2s;background:transparent;color:var(--text)}
.type-opt.sel{border-color:var(--green);background:rgba(0,200,83,.1);color:var(--green)}
.player-row{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(10,21,10,0.6);border-radius:8px;font-size:.85rem;margin-bottom:4px}
.weight-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.weight-row:last-child{border-bottom:none}
.weight-input{width:64px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:.85rem;text-align:center}
.weight-pct{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--green);width:40px;text-align:right}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:rgba(18,36,18,0.98);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;backdrop-filter:blur(16px)}
.modal-title{font-weight:600;font-size:1rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.profile-hero{text-align:center;padding:20px 0 10px}
.profile-av-lg{width:72px;height:72px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:#000;margin:0 auto 10px;border:3px solid var(--green)}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px}
.profile-badges{display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.priority-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;font-weight:700}
.priority-in{background:var(--green);color:#000}
.priority-wait{background:var(--gold);color:#000}
.deadline-bar{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:8px 12px;font-size:.78rem;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cupo-bars{display:flex;gap:8px;margin-bottom:10px}
.cupo-bar-item{flex:1}
.cupo-label{font-size:.7rem;color:var(--muted);margin-bottom:3px}

</style>
</head>

// ── RENDER ROOT ──────────────────────────────────────────────────────────────
async function render() {
  const app = document.getElementById('app');
  // Background image always present
  let bgEl = document.getElementById('bg-field');
  if (!bgEl) {
    bgEl = document.createElement('img');
    bgEl.id = 'bg-field'; bgEl.className = 'bg-field';
    bgEl.src = IMG_BG;
    document.getElementById('app').prepend(bgEl);
  }

  if (!STATE.session) { app.innerHTML = ''; app.prepend(bgEl); app.innerHTML += renderAuth(); bindAuth(); return; }
  if (!STATE.profile) { app.innerHTML = '<div class="loading">Cargando perfil...</div>'; return; }

  const isAdmin = STATE.profile.role === 'admin';
  app.innerHTML = `
    ${renderHeader()}
    <div id="tab-content" class="content"></div>
    ${renderNav(isAdmin)}
  `;
  app.prepend(bgEl);
  bindNav();
  await renderTab();
}

function renderHeader() {
  const p = STATE.profile;
  return `<div class="header">
    <span class="header-logo">⚽ REAL FC</span>
    <div class="header-right">
      ${p?.role==='admin'?'<span class="badge badge-admin">Admin</span>':''}
      ${p?.guaranteed_access?'<span class="badge badge-blue">★</span>':''}
      <div class="avatar">${initials(p?.full_name)}</div>
    </div>
  </div>`;
}

function renderNav(isAdmin) {
  const tabs = [
    {key:'matches',icon:'⚽',label:'Partidos'},
    ...(isAdmin?[{key:'score',icon:'🏆',label:'Ranking'}]:[]),
    ...(isAdmin?[{key:'admin',icon:'⚙️',label:'Admin'},{key:'pagos',icon:'💰',label:'Pagos'}]:[]),
    {key:'profile',icon:'👤',label:'Perfil'},
  ];
  return `<nav class="nav">${tabs.map(t=>`
    <button class="nav-item ${STATE.tab===t.key?'active':''}" onclick="setTab('${t.key}')">
      <span style="font-size:18px">${t.icon}</span><span>${t.label}</span>
    </button>`).join('')}</nav>`;
}

function bindNav() {
  window.setTab = async (t) => { STATE.tab=t; await renderTab(); updateNav(); };
}
function updateNav() {
  document.querySelectorAll('.nav-item').forEach(b=>{
    const m = b.getAttribute('onclick').match(/'(\w+)'/);
    if(m) b.classList.toggle('active', m[1]===STATE.tab);
  });
}
async function renderTab() {
  const el = document.getElementById('tab-content');
  if(!el) return;
  el.innerHTML = '<div class="loading">Cargando...</div>';
  switch(STATE.tab){
    case 'matches': await renderMatches(el); break;
    case 'score':   await renderScore(el); break;
    case 'admin':   await renderAdmin(el); break;
    case 'pagos':   await renderPagos(el); break;
    case 'profile': renderProfile(el); break;
  }
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function renderAuth() {
  return `<div class="auth-screen">
    <div class="auth-logo"><h1>⚽ REAL FC</h1><p>Club de fútbol privado</p></div>
    <div class="auth-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Ingresar</button>
        <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Registrarse</button>
      </div>
      <div id="auth-alert"></div>
      <div id="auth-form"></div>
    </div>
  </div>`;
}
function bindAuth() {
  window.switchAuthTab = (t) => {
    document.getElementById('tab-login').classList.toggle('active',t==='login');
    document.getElementById('tab-register').classList.toggle('active',t==='register');
    document.getElementById('auth-alert').innerHTML='';
    document.getElementById('auth-form').innerHTML = t==='login' ? loginForm() : registerForm();
    bindAuthForms();
  };
  window.switchAuthTab('login');
}
function loginForm(){return`<div class="field"><label>Email</label><input id="a-email" type="email" placeholder="tu@email.com"></div>
<div class="field"><label>Contraseña</label><input id="a-pass" type="password" placeholder="••••••••"></div>
<button class="btn btn-primary btn-full" id="btn-login">Ingresar</button>`;}
function registerForm(){return`<div class="field"><label>Código de invitación</label><input id="a-code" placeholder="Ej. REALFC-2026" oninput="this.value=this.value.toUpperCase()"></div>
<div class="field"><label>Nombre completo</label><input id="a-name" placeholder="Juan Pérez"></div>
<div class="field"><label>Apodo (opcional)</label><input id="a-nick" placeholder="Juancho"></div>
<div class="field"><label>Email</label><input id="a-email" type="email" placeholder="tu@email.com"></div>
<div class="field"><label>Contraseña</label><input id="a-pass" type="password" placeholder="Mínimo 6 caracteres"></div>
<button class="btn btn-primary btn-full" id="btn-register">Crear cuenta</button>`;}
function bindAuthForms(){
  const showAlert=(msg,ok)=>{ document.getElementById('auth-alert').innerHTML=`<div class="alert alert-${ok?'success':'error'}">${msg}</div>`; };
  const btnL=document.getElementById('btn-login');
  if(btnL) btnL.onclick=async()=>{
    btnL.disabled=true; btnL.textContent='Ingresando...';
    const {error}=await sb.auth.signInWithPassword({email:document.getElementById('a-email').value,password:document.getElementById('a-pass').value});
    if(error){showAlert(error.message,false);btnL.disabled=false;btnL.textContent='Ingresar';}
  };
  const btnR=document.getElementById('btn-register');
  if(btnR) btnR.onclick=async()=>{
    const code=document.getElementById('a-code').value.trim().toUpperCase();
    const name=document.getElementById('a-name').value.trim();
    if(!code){showAlert('Ingresa el código de invitación',false);return;}
    if(!name){showAlert('Ingresa tu nombre completo',false);return;}
    btnR.disabled=true; btnR.textContent='Verificando...';
    // Validar código
    const {data:codeData,error:codeErr}=await sb.from('invite_codes').select('*').eq('code',code).eq('is_active',true).maybeSingle();
    if(codeErr||!codeData){showAlert('Código de invitación inválido o inactivo',false);btnR.disabled=false;btnR.textContent='Crear cuenta';return;}
    if(codeData.expires_at&&new Date(codeData.expires_at)<new Date()){showAlert('El código de invitación ha expirado',false);btnR.disabled=false;btnR.textContent='Crear cuenta';return;}
    if(codeData.max_uses&&codeData.uses_count>=codeData.max_uses){showAlert('El código de invitación ya alcanzó el límite de usos',false);btnR.disabled=false;btnR.textContent='Crear cuenta';return;}
    btnR.textContent='Registrando...';
    const nick=document.getElementById('a-nick').value;
    const {data,error}=await sb.auth.signUp({
      email:document.getElementById('a-email').value,
      password:document.getElementById('a-pass').value,
      options:{data:{full_name:name,nickname:nick}}
    });
    if(error){showAlert(error.message,false);btnR.disabled=false;btnR.textContent='Crear cuenta';}
    else{
      if(data.user){
        await sb.from('profiles').upsert({id:data.user.id,full_name:name||data.user.email.split('@')[0],nickname:nick||null,join_date:new Date().toISOString().split('T')[0]},{onConflict:'id'});
        // Incrementar contador de usos del código
        await sb.from('invite_codes').update({uses_count:codeData.uses_count+1}).eq('id',codeData.id);
      }
      showAlert('¡Bienvenido! Ingresa con tu email y contraseña.',true);
      btnR.disabled=false; btnR.textContent='Crear cuenta';
    }
  };
}

// ── MATCHES ──────────────────────────────────────────────────────────────────
async function renderMatches(el) {
  const {data:matches}=await sb.from('matches').select('*').order('match_date',{ascending:true});
  const {data:myRegs}=await sb.from('registrations').select('*').eq('user_id',STATE.session.user.id).in('status',['confirmed','absent_justified']);
  const regMap={};
  (myRegs||[]).forEach(r=>regMap[r.match_id]=r);
  const isAdmin=STATE.profile.role==='admin';
  const upcoming=(matches||[]).filter(m=>m.status==='open'||m.status==='closed');
  const past=(matches||[]).filter(m=>m.status==='played'||m.status==='cancelled');

  let html=isAdmin?`<button class="btn btn-primary btn-full" onclick="openModal('create-match')">+ Nuevo partido</button>`:'';
  if(upcoming.length){html+=`<div class="section-title">Próximos</div>`;for(const m of upcoming)html+=await buildMatchCard(m,regMap[m.id],isAdmin);}
  if(past.length){html+=`<div class="section-title" style="margin-top:8px">Historial</div>`;for(const m of past)html+=await buildMatchCard(m,regMap[m.id],isAdmin);}
  if(!matches?.length)html+=`<div class="empty"><div class="empty-icon">⚽</div><p>No hay partidos programados</p></div>`;
  el.innerHTML=html;
  bindMatchActions();
}

async function buildMatchCard(m,myReg,isAdmin){
  const {count:footCount}=await sb.from('registrations').select('id',{count:'exact',head:true}).eq('match_id',m.id).eq('status','confirmed').in('type',['football','both']);
  const {count:totalCount}=await sb.from('registrations').select('id',{count:'exact',head:true}).eq('match_id',m.id).eq('status','confirmed');
  const maxFoot=m.max_players||18;
  const maxTotal=m.max_total||30;
  const pctFoot=Math.min(((footCount||0)/maxFoot)*100,100);
  const pctTotal=Math.min(((totalCount||0)/maxTotal)*100,100);
  const hasReg=myReg&&myReg.status==='confirmed';
  const isAbsent=myReg&&myReg.status==='absent_justified';
  const statusLabel={open:'Abierto',closed:'Cerrado',played:'Jugado',cancelled:'Cancelado'}[m.status]||m.status;

  // Deadline info
  let deadlineHtml='';
  if(m.confirmation_deadline&&m.status==='open'){
    const dl=new Date(m.confirmation_deadline);
    const now=new Date();
    const diff=dl-now;
    if(diff>0){
      const hrs=Math.floor(diff/36e5);
      const mins=Math.floor((diff%36e5)/60000);
      deadlineHtml=`<div class="deadline-bar">⏱ Límite inscripción: ${fmtDT(m.confirmation_deadline)} (${hrs>0?hrs+'h ':''}${mins}min)</div>`;
    } else {
      deadlineHtml=`<div class="deadline-bar" style="color:var(--red);border-color:rgba(255,68,68,.2)">🔒 Inscripción cerrada — prioridades asignadas</div>`;
    }
  }

  // My priority number
  let myPriority='';
  if(hasReg&&myReg.priority_number){
    const maxP=m.max_players||18;
    const isIn=myReg.priority_number<=maxP;
    myPriority=`<span class="priority-badge ${isIn?'priority-in':'priority-wait'}">${myReg.priority_number}</span>`;
  }

  return `<div class="match-card" data-id="${m.id}">
    <div class="match-top">
      <div><div class="match-date">${fmtDate(m.match_date)}</div><div class="match-time">${(m.match_time||'').slice(0,5)}</div></div>
      <div style="display:flex;align-items:center;gap:8px">${myPriority}<span class="match-status status-${m.status}">${statusLabel}</span></div>
    </div>
    <div class="match-body">
      ${deadlineHtml}
      <div class="cupo-bars">
        <div class="cupo-bar-item">
          <div class="cupo-label">⚽ Jugadores ${footCount||0}/${maxFoot}</div>
          <div class="progress-bar" style="margin-bottom:0"><div class="progress-fill" style="width:${pctFoot}%"></div></div>
        </div>
        <div class="cupo-bar-item">
          <div class="cupo-label">👥 Total evento ${totalCount||0}/${maxTotal}</div>
          <div class="progress-bar" style="margin-bottom:0"><div class="progress-fill" style="width:${pctTotal}%;background:var(--blue)"></div></div>
        </div>
      </div>
      <div class="match-stats" style="margin-top:8px">
        ${m.has_food?'<span class="match-stat">🍽️ Comida</span>':''}
        ${hasReg?`<span class="chip chip-green">✓ Inscrito (${myReg.type==='both'?'fútbol+comida':myReg.type==='football'?'fútbol':'comida'})</span>`:''}
        ${isAbsent?`<span class="chip chip-gold">✈️ Ausencia justificada</span>`:''}
      </div>
      <div class="match-actions">
        <button class="btn btn-outline btn-sm" onclick="openMatchDetail('${m.id}')">Ver detalle</button>
        ${m.status==='open'&&!hasReg&&!isAbsent?`<button class="btn btn-primary btn-sm" onclick="openMatchDetail('${m.id}')">Inscribirse</button>`:''}
        ${m.status==='open'&&hasReg?`<button class="btn btn-danger btn-sm" onclick="openMatchDetail('${m.id}')">Gestionar</button>`:''}
        ${m.status==='open'&&isAbsent?`<button class="btn btn-outline btn-sm" style="border-color:var(--gold);color:var(--gold)" onclick="openMatchDetail('${m.id}')">✈️ Ausencia</button>`:''}
        ${isAdmin?`<button class="btn btn-ghost btn-sm" onclick="openModal('edit-match','${m.id}')">✏️</button>`:''}
      </div>
    </div>
  </div>`;
}

// ── MODAL SYSTEM ─────────────────────────────────────────────────────────────
async function showModal(){
  const existing=document.getElementById('modal-overlay');
  if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  const modal=document.createElement('div');
  modal.className='modal';
  if(STATE.modal.type==='match-detail')modal.innerHTML=await buildMatchDetailModal(STATE.modal.id);
  else if(STATE.modal.type==='create-match')modal.innerHTML=await buildMatchFormModal(null);
  else if(STATE.modal.type==='edit-match')modal.innerHTML=await buildMatchFormModal(STATE.modal.id);
  overlay.appendChild(modal);
  document.getElementById('app').appendChild(overlay);
  bindModalActions();
}
function closeModal(){
  const el=document.getElementById('modal-overlay');
  if(el)el.remove();
  STATE.modal=null;
}

  const {data:players}=await sb.from('registrations').select('*, profiles(full_name,nickname,guaranteed_access)').eq('match_id',matchId).eq('status','confirmed').order('priority_number',{ascending:true,nullsFirst:false});

  const isAdmin=STATE.profile.role==='admin';
  const hasReg=myReg&&myReg.status==='confirmed';
  const isAbsent=myReg&&myReg.status==='absent_justified';
  const maxFoot=match.max_players||18;
  const maxTotal=match.max_total||30;
  const {count:totalCount}=await sb.from('registrations').select('id',{count:'exact',head:true}).eq('match_id',matchId).eq('status','confirmed');

          <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="doRegister('${matchId}')">Confirmar inscripción</button>

    } else if(isAbsent) {
      regSection=`<div class="alert" style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:var(--gold)">✈️ Avisaste ausencia justificada — no ocupa lugar en el cupo</div>
      <button class="btn btn-outline btn-full" style="border-color:var(--gold);color:var(--gold)" onclick="doCancel('${matchId}')">Cancelar aviso de ausencia</button>
      <hr class="divider">`;
    } else {
      const maxP=match.max_players||18;
      const isIn=myReg.priority_number&&myReg.priority_number<=maxP;
      const waitNum=myReg.priority_number&&myReg.priority_number>maxP;
      regSection=`<div class="alert alert-success">✓ Inscrito: ${myReg.type==='both'?'Fútbol + Comida':myReg.type==='football'?'Solo Fútbol':'Solo Comida'}
        ${myReg.priority_number?`<br>Número de prioridad: <strong>#${myReg.priority_number}</strong> ${isIn?'— <span style="color:var(--green)">TITULAR ✓</span>':waitNum?'— <span style="color:var(--gold)">LISTA DE ESPERA</span>':''}`:''}</div>

        <button class="btn btn-danger btn-full" onclick="doCancel('${matchId}')">Cancelar inscripción</button><hr class="divider">`;
    }
  }

  const playerRows=(players||[]).map((reg,i)=>{

    const name=p.nickname||p.full_name||'—';
    const maxP=match.max_players||18;
    const pNum=reg.priority_number;
    const isInList=pNum&&pNum<=maxP;
    return `<div class="player-row">
      ${pNum?`<span class="priority-badge ${isInList?'priority-in':'priority-wait'}" style="width:26px;height:26px;font-size:.9rem">${pNum}</span>`:
             `<span style="font-family:'Bebas Neue',sans-serif;color:var(--muted);width:26px;text-align:center">${i+1}</span>`}

      <span style="flex:1">${name}</span>

        ${(reg.type==='food'||reg.type==='both')&&!reg.paid_food?`<button class="btn btn-ghost btn-sm" style="color:var(--gold)" onclick="markPaid('${reg.id}','paid_food')">$🍽</button>`:''}

    <button class="btn btn-danger btn-full" style="margin-top:8px" onclick="openModal('edit-match','${matchId}')">✏️ Editar / Eliminar partido</button>
  `:''}`;
}

  const today=new Date().toISOString().split('T')[0];

  return `<div class="modal-title"><span>${matchId?'Editar partido':'Nuevo partido'}</span><button class="btn btn-ghost" onclick="closeModal()">✕</button></div>
  <div id="modal-alert"></div>
  <div class="grid-2">
    <div class="field"><label>Fecha</label><input type="date" id="m-date" min="${today}" value="${match?match.match_date:''}"></div>
    <div class="field"><label>Hora</label><input type="time" id="m-time" value="${match?(match.match_time||'').slice(0,5):(window._adminCfg?.default_match_time||'17:00')}"></div>
  </div>
  <div class="grid-2">
    <div class="field"><label>Cupo jugadores</label><input type="number" id="m-max" value="${match?match.max_players:18}" min="4" max="30"></div>
    <div class="field"><label>Cupo total evento</label><input type="number" id="m-total" value="${match?match.max_total:30}" min="4" max="60"></div>

  <div class="switch-row">
    <span>¿Incluye comida posterior?</span>

  <div style="display:flex;gap:8px;margin-top:10px">

function bindModalActions(){
  window._selectedType='both';
  window.selectType=(el,type)=>{
    document.querySelectorAll('.type-opt').forEach(b=>b.classList.remove('sel'));
    el.classList.add('sel'); window._selectedType=type;
  };

  window.doRegister=async(matchId)=>{
    const type=window._selectedType||'both';
    const workTrip=document.getElementById('work-trip')?.checked||false;
    // Disparar audio inmediatamente antes de cualquier await (requerido por navegadores móviles)
    if(!workTrip) playWelcome();
    const status=workTrip?'absent_justified':'confirmed';
    const {error}=await sb.from('registrations').upsert({
      match_id:matchId,user_id:STATE.session.user.id,type,status,
      is_work_trip:workTrip,confirmed_at:new Date().toISOString()
    },{onConflict:'match_id,user_id'});
    if(error){document.getElementById('modal-alert').innerHTML=`<div class="alert alert-error">${error.message}</div>`;return;}
    closeModal(); STATE.tab='matches'; await renderTab();
  };

  window.toggleWorkTripBtn=async(matchId)=>{
    const isWorkTrip=document.getElementById('work-trip')?.checked||false;
    const container=document.getElementById('reg-btn-container');
    if(!container)return;
    if(isWorkTrip){
      container.innerHTML=`<button class="btn btn-outline btn-full" style="margin-top:10px;border-color:var(--gold);color:var(--gold)" onclick="doRegister('${matchId}')">✈️ Avisar ausencia justificada</button>
      <p style="font-size:.75rem;color:var(--muted);margin-top:6px;text-align:center">No ocupará lugar en el cupo. No penaliza el scoring.</p>`;
    } else {
      container.innerHTML=`<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="doRegister('${matchId}')">Confirmar inscripción</button>`;
    }
  };

  window.doCancel=async(matchId)=>{
    const workTrip=document.getElementById('work-trip')?.checked||false;
    await sb.from('registrations').update({status:'cancelled',cancelled_at:new Date().toISOString(),is_work_trip:workTrip}).eq('match_id',matchId).eq('user_id',STATE.session.user.id);
    closeModal(); await renderTab();
  };

  window.doCheckin=async(matchId,userId)=>{
    const {data:latest}=await sb.from('registrations').select('arrival_order').eq('match_id',matchId).order('arrival_order',{ascending:false}).limit(1);
    const next=(latest?.[0]?.arrival_order||0)+1;
    await sb.from('registrations').update({arrival_order:next,checked_in_at:new Date().toISOString()}).eq('match_id',matchId).eq('user_id',userId);
    await showModal();
  };

  window.markPaid=async(regId,field)=>{
    await sb.from('registrations').update({[field]:true,paid_at:new Date().toISOString()}).eq('id',regId);
    await showModal();
  };

  window.closeMatch=async(matchId)=>{
    await sb.from('matches').update({status:'played'}).eq('id',matchId);
    closeModal(); await renderTab();
  };

  window.deleteMatch=async(matchId)=>{
    if(!confirm('¿Eliminar este partido? Esta acción no se puede deshacer.'))return;
    await sb.from('registrations').delete().eq('match_id',matchId);
    await sb.from('matches').delete().eq('id',matchId);
    closeModal(); await renderTab();
  };

  window.saveMatch=async(matchId)=>{
    const dateVal=document.getElementById('m-date').value;
    const timeVal=document.getElementById('m-time').value;
    if(!dateVal){document.getElementById('modal-alert').innerHTML='<div class="alert alert-error">Selecciona una fecha</div>';return;}
    // Compute default deadline if not set
    let deadlineVal=document.getElementById('m-deadline').value;
    if(!deadlineVal){
      const matchDT=new Date(`${dateVal}T${timeVal}:00`);
      matchDT.setHours(matchDT.getHours()-5);
      deadlineVal=matchDT.toISOString();
    } else {
      deadlineVal=new Date(deadlineVal).toISOString();
    }
    const payload={
      match_date:dateVal,match_time:timeVal,
      max_players:parseInt(document.getElementById('m-max').value),
      max_total:parseInt(document.getElementById('m-total').value),
      confirmation_deadline:deadlineVal,
      has_food:document.getElementById('m-food').checked,
      notes:document.getElementById('m-notes').value,
    };
    let error;
    if(matchId){({error}=await sb.from('matches').update(payload).eq('id',matchId));}
    else{({error}=await sb.from('matches').insert({...payload,created_by:STATE.session.user.id}));}
    if(error){document.getElementById('modal-alert').innerHTML=`<div class="alert alert-error">${error.message}</div>`;return;}
    closeModal(); await renderTab();
  };

  window.assignPriorities=async(matchId)=>{
    // Get all confirmed football regs sorted by score (guaranteed first, then score desc)
    const {data:match}=await sb.from('matches').select('*').eq('id',matchId).single();
    const {data:regs}=await sb.from('registrations').select('*, profiles(*)').eq('match_id',matchId).eq('status','confirmed');
    // Separate football players and food-only
    const footRegs=regs.filter(r=>r.type==='football'||r.type==='both');
    const foodOnly=regs.filter(r=>r.type==='food');
    // Sort football by guaranteed first, then we need scores
    // Compute basic score inline
    const {data:allRegs}=await sb.from('registrations').select('*, matches(match_date,status)');
    const {data:cfgArr}=await sb.from('scoring_config').select('*').eq('is_active',true).limit(1);
    const cfg=cfgArr?.[0]||{rolling_weeks:8,advance_notice_hours:24,weight_seniority:20,weight_attendance:20,weight_advance_notice:20,weight_payment:15,weight_frequency:15,weight_arrival:5,weight_streak:5};
    const rollStart=new Date();rollStart.setDate(rollStart.getDate()-cfg.rolling_weeks*7);

    const scored=footRegs.map(reg=>{
      const p=reg.profiles;
      const uregs=(allRegs||[]).filter(r=>r.user_id===reg.user_id);
      const recent=uregs.filter(r=>r.matches&&new Date(r.matches.match_date)>=rollStart);
      const played=recent.filter(r=>r.matches?.status==='played');
      const confirmed=played.filter(r=>r.status==='confirmed'&&!r.is_work_trip);
      const checkedIn=confirmed.filter(r=>r.arrival_order!=null);
      const cancelled=recent.filter(r=>r.status==='cancelled'&&!r.is_work_trip);
      const timely=cancelled.filter(r=>r.cancelled_at&&r.matches?.match_date&&(new Date(r.matches.match_date)-new Date(r.cancelled_at))/36e5>=cfg.advance_notice_hours);
      const paid=played.filter(r=>r.paid_football||r.paid_food);
      const months=Math.min(24,(Date.now()-new Date(p?.join_date||Date.now()))/(1000*60*60*24*30.5));
      const s={
        seniority:(months/24)*100,
        attendance:confirmed.length>0?(checkedIn.length/confirmed.length)*100:50,
        notice:cancelled.length>0?(timely.length/cancelled.length)*100:100,
        pay:played.length>0?(paid.length/played.length)*100:50,
        freq:played.length>0?Math.min((confirmed.length/played.length)*100,100):50,
        arrival:(()=>{const arr=confirmed.filter(r=>r.arrival_order!=null).map(r=>r.arrival_order);return arr.length?Math.max(0,100-(arr.reduce((a,b)=>a+b,0)/arr.length-1)*7):50;})(),
        streak:Math.min(confirmed.length*12.5,100)
      };
      const score=s.seniority*cfg.weight_seniority/100+s.attendance*cfg.weight_attendance/100+s.notice*cfg.weight_advance_notice/100+s.pay*cfg.weight_payment/100+s.freq*cfg.weight_frequency/100+s.arrival*cfg.weight_arrival/100+s.streak*cfg.weight_streak/100;
      return {...reg,score:Math.round(score*10)/10,guaranteed:p?.guaranteed_access||false};
    });

    scored.sort((a,b)=>{
      if(a.guaranteed&&!b.guaranteed)return -1;
      if(!a.guaranteed&&b.guaranteed)return 1;
      return b.score-a.score;
    });

    // Assign priority numbers
    const updates=[];
    scored.forEach((reg,i)=>updates.push(sb.from('registrations').update({priority_number:i+1}).eq('id',reg.id)));
    // Food-only don't get priority numbers for football
    await Promise.all(updates);
    alert(`✅ Números de prioridad asignados a ${scored.length} jugadores`);
    await showModal();
  };

  window.downloadPDF=async(matchId)=>{
    const {data:match}=await sb.from('matches').select('*').eq('id',matchId).single();
    const {data:regs}=await sb.from('registrations').select('*, profiles(full_name,nickname)').eq('match_id',matchId).eq('status','confirmed').order('priority_number',{ascending:true,nullsFirst:false});
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();
    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.text('REAL FC — Lista de participantes',20,20);
    doc.setFontSize(11);
    doc.setFont('helvetica','normal');
    doc.text(`Partido: ${fmtDateLong(match.match_date)} ${(match.match_time||'').slice(0,5)}`,20,32);
    doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`,20,40);
    doc.line(20,45,190,45);
    let y=55;
    doc.setFont('helvetica','bold');
    doc.text('#',20,y);doc.text('Nombre',35,y);doc.text('Participa',140,y);doc.text('Pago',175,y);
    y+=8;doc.line(20,y-3,190,y-3);
    doc.setFont('helvetica','normal');
    const maxP=match.max_players||18;
    (regs||[]).forEach((reg,i)=>{
      if(y>270){doc.addPage();y=20;}
      const p=reg.profiles||{};
      const name=p.full_name||'—';
      const tipo=reg.type==='both'?'Fútbol + Comida':reg.type==='football'?'Fútbol':'Comida';
      const pago=reg.paid_football||reg.paid_food?'✓':'—';
      const num=reg.priority_number||'—';
      if(reg.priority_number===maxP+1){
        y+=4;doc.setFontSize(9);doc.setTextColor(150);doc.text('— Lista de espera —',80,y);doc.setFontSize(11);doc.setTextColor(0);y+=6;
      }
      doc.text(String(num),20,y);doc.text(name,35,y);doc.text(tipo,140,y);doc.text(pago,175,y);
      y+=8;
    });
    doc.save(`realfc-${match.match_date}.pdf`);
  };
}

  const code=document.getElementById('new-code').value.trim().toUpperCase();
  if(!code){alert('Ingresa un código');return;}
  const maxUses=document.getElementById('new-max').value;
  const exp=document.getElementById('new-exp').value;
  await sb.from('invite_codes').insert({
    code,
    created_by:STATE.session.user.id,
    max_uses:maxUses?parseInt(maxUses):null,
    expires_at:exp?new Date(exp+'T23:59:59').toISOString():null
  });
  await loadCodesSection();

  const id=btn.dataset.id;
  const current=btn.dataset.active==='true';
  await sb.from('invite_codes').update({is_active:!current}).eq('id',id);
  await loadCodesSection();

  const id=btn.dataset.id;
  await sb.from('invite_codes').delete().eq('id',id);
  await loadCodesSection();
};

  // Totales
  const totalEsperadoFoot = (regs||[]).filter(r=>r.type==='football'||r.type==='both').length * 100;
  const totalEsperadoFood = (regs||[]).filter(r=>r.type==='food'||r.type==='both').length * 100;

  const totalRecaudado = totalPagadoFoot + totalPagadoFood + totalExtras;
  const diferencia = totalRecaudado - totalEsperado;

  const rows = (regs||[]).map(r=>{
    const p = r.profiles||{};

        </div>

  // Filas de extras
  const extraRows = (extras||[]).map(e=>
    `<div class="player-row" style="padding:8px">
      <span style="flex:1;font-size:.85rem">${e.description}</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--blue)">$${parseFloat(e.amount).toFixed(0)}</span>
      <button class="btn btn-ghost btn-sm" data-id="${e.id}" onclick="deleteExtra(this)">🗑️</button>

  el.innerHTML = `

    <!-- Resumen financiero -->
    <div class="card" style="background:rgba(0,200,83,0.05);border-color:rgba(0,200,83,0.2)">
      <div class="card-title" style="margin-bottom:10px">💰 Resumen financiero</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:.72rem;color:var(--muted)">Esperado fútbol</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--text)">$${totalEsperadoFoot}</div>
          <div style="font-size:.7rem;color:var(--green)">Recaudado: $${totalPagadoFoot}</div>
        </div>
        <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:.72rem;color:var(--muted)">Esperado comida</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--text)">$${totalEsperadoFood}</div>
          <div style="font-size:.7rem;color:var(--green)">Recaudado: $${totalPagadoFood}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:.72rem;color:var(--muted)">Extras</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--blue)">$${totalExtras.toFixed(0)}</div>
        </div>
        <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:.72rem;color:var(--muted)">Total esperado</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem">$${totalEsperado}</div>
        </div>
        <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:.72rem;color:var(--muted)">Total recaudado</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:${diferencia>=0?'var(--green)':'var(--red)'}">$${totalRecaudado.toFixed(0)}</div>
          <div style="font-size:.7rem;color:${diferencia>=0?'var(--green)':'var(--red)'}">${diferencia>=0?'+':''}\$${diferencia.toFixed(0)}</div>

    <div class="card" style="padding:8px">
      ${rows||'<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:16px">Sin inscriptos</p>'}

    <div class="section-title">Cobros extras</div>

      <div style="display:flex;gap:8px;margin-top:8px;padding:4px">
        <input id="extra-desc" placeholder="Descripción" style="flex:2;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:Inter;font-size:.85rem">
        <input id="extra-amt" type="number" placeholder="$" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:Inter;font-size:.85rem">
        <button class="btn btn-primary btn-sm" onclick="addExtra('${selId}')">+</button>

    <button class="btn btn-outline btn-full" style="border-color:var(--blue);color:var(--blue)" onclick="downloadPagosPDF('${selId}')">📄 Descargar resumen PDF</button>

  window.togglePago = async(regId, field, checked) => {

    await renderPagos(el);

  window.deleteExtra = async(btn) => {

    await sb.from('extra_charges').delete().eq('id',btn.dataset.id);
    await renderPagos(el);
  };

  window.downloadPagosPDF = async(matchId) => {
    const {data:match} = await sb.from('matches').select('*').eq('id',matchId).single();
    const {data:regs2} = await sb.from('registrations').select('*, profiles(full_name,nickname)').eq('match_id',matchId).in('status',['confirmed','absent_justified']).order('created_at');
    const {data:extras2} = await sb.from('extra_charges').select('*').eq('match_id',matchId).order('created_at');
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text('REAL FC — Resumen de pagos', 20, 20);
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    doc.text(`Partido: ${fmtDateLong(match.match_date)} ${(match.match_time||'').slice(0,5)}`, 20, 30);
    doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`, 20, 37);
    doc.line(20, 42, 190, 42);
    let y = 50;
    doc.setFont('helvetica','bold');
    doc.text('Nombre', 20, y); doc.text('Confirmó', 95, y); doc.text('Pagó ⚽', 125, y); doc.text('Pagó 🍽', 150, y); doc.text('Total', 175, y);
    y+=6; doc.line(20,y-2,190,y-2); doc.setFont('helvetica','normal');
    let tEspFoot=0,tEspFood=0,tPagFoot=0,tPagFood=0;
    (regs2||[]).forEach(r=>{
      if(y>270){doc.addPage();y=20;}
      const p=r.profiles||{};
      const name=(p.nickname||p.full_name||'—').substring(0,18);

      const pFoot=r.paid_football?'✓':'—'; const pFood=r.paid_food?'✓':'—';
      const total='$'+((r.paid_football?100:0)+(r.paid_food?100:0));
      if(r.type==='football'||r.type==='both')tEspFoot+=100;
      if(r.type==='food'||r.type==='both')tEspFood+=100;

      doc.text(name,20,y); doc.text(conf,95,y); doc.text(pFoot,130,y); doc.text(pFood,155,y); doc.text(total,175,y);

    y+=4; doc.line(20,y-2,190,y-2);
    doc.setFont('helvetica','bold');
    doc.text('TOTALES',20,y);
    doc.text('$'+tEspFoot,125,y); doc.text('$'+tEspFood,150,y);
    doc.text('$'+(tPagFoot+tPagFood),175,y); y+=10;
    if((extras2||[]).length){
      doc.text('Cobros extras:',20,y); y+=6; doc.setFont('helvetica','normal');

      });

    }
    doc.setFontSize(12);
    const tRec=tPagFoot+tPagFood+((extras2||[]).reduce((s,e)=>s+parseFloat(e.amount),0));

}

window.openHistorial = async(userId, userName) => {
  // Cargar todas las inscripciones del usuario con datos del partido
  const {data:allRegs} = await sb.from('registrations')
    .select('*, matches(match_date, match_time, status)')
    .eq('user_id', userId)
    .in('matches.status', ['played'])
    .in('status', ['confirmed', 'absent_justified'])
    .order('created_at', {ascending: false});

  // Filtrar solo partidos jugados con deuda
  const regsWithDebt = (allRegs||[]).filter(r => {
    if(!r.matches || r.matches.status !== 'played') return false;
    const debefoot = (r.type==='football'||r.type==='both') && !r.paid_football;
    const debefood = (r.type==='food'||r.type==='both') && !r.paid_food;
    return debefoot || debefood;
  });

  // Calcular resumen total (todos los partidos jugados)
  const allPlayed = (allRegs||[]).filter(r => r.matches?.status === 'played');
  let totalEsperado = 0, totalPagado = 0;
  allPlayed.forEach(r => {
    if(r.type==='football'||r.type==='both') { totalEsperado+=100; if(r.paid_football) totalPagado+=100; }
    if(r.type==='food'||r.type==='both') { totalEsperado+=100; if(r.paid_food) totalPagado+=100; }
  });
  const totalDeuda = totalEsperado - totalPagado;
  const pctCumplimiento = totalEsperado > 0 ? Math.round((totalPagado/totalEsperado)*100) : 100;

  // Construir filas de deuda
  const debtRows = regsWithDebt.map(r => {
    const debefoot = (r.type==='football'||r.type==='both') && !r.paid_football;
    const debefood = (r.type==='food'||r.type==='both') && !r.paid_food;
    const deuda = (debefoot?100:0)+(debefood?100:0);
    return `<div class="player-row" style="padding:8px 10px">
      <div style="flex:1">
        <div style="font-size:.85rem;font-weight:500">${fmtDate(r.matches.match_date)}</div>
        <div style="font-size:.72rem;color:var(--muted)">
          ${debefoot?'<span style="color:var(--red)">⚽ debe $100</span>':''}
          ${debefoot&&debefood?' · ':''}
          ${debefood?'<span style="color:var(--red)">🍽 debe $100</span>':''}
        </div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red)">-$${deuda}</div>
    </div>`;
  }).join('');

  // Crear modal
  const existing = document.getElementById('modal-overlay');
  if(existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) closeModal(); };
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-title">
      <span>📊 ${userName}</span>
      <button class="btn btn-ghost" onclick="closeModal()">✕</button>
    </div>

    <!-- Resumen -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:.68rem;color:var(--muted)">Total pagado</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--green)">$${totalPagado}</div>
      </div>
      <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:.68rem;color:var(--muted)">Deuda total</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${totalDeuda>0?'var(--red)':'var(--green)'}">$${totalDeuda}</div>
      </div>
      <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:.68rem;color:var(--muted)">Cumplimiento</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${pctCumplimiento>=80?'var(--green)':pctCumplimiento>=50?'var(--gold)':'var(--red)'}">${pctCumplimiento}%</div>
      </div>
    </div>

    <!-- Botón PDF -->
    <button class="btn btn-outline btn-full" style="border-color:var(--blue);color:var(--blue);margin-bottom:12px" 
      onclick="downloadHistorialPDF('${userId}','${userName}',${totalPagado},${totalDeuda},${pctCumplimiento},${allPlayed.length})">
      📄 Descargar resumen PDF
    </button>

    <!-- Deudas -->
    <div class="section-title">Partidos con deuda (${regsWithDebt.length})</div>
    ${debtRows || '<div style="text-align:center;padding:20px;color:var(--green);font-size:.9rem">✓ Sin deudas pendientes</div>'}
  `;
  overlay.appendChild(modal);
  document.getElementById('app').appendChild(overlay);
};

window.downloadHistorialPDF = (userId, userName, pagado, deuda, pct, partidos) => {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('REAL FC — Historial de pagos', 20, 20);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text(`Participante: ${userName}`, 20, 32);
  doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`, 20, 40);
  doc.line(20, 45, 190, 45);
  
  let y = 55;
  doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('Resumen', 20, y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(`Partidos jugados: ${partidos}`, 25, y); y+=7;
  doc.text(`Total pagado: $${pagado}`, 25, y); y+=7;
  doc.text(`Deuda pendiente: $${deuda}`, 25, y); y+=7;
  doc.text(`Cumplimiento de pagos: ${pct}%`, 25, y); y+=12;

  if(deuda > 0){
    doc.setFont('helvetica','bold');
    doc.text('Partidos con deuda:', 20, y); y+=8;
    doc.setFont('helvetica','normal');
    // Obtener datos del modal actual
    document.querySelectorAll('#modal-overlay .player-row').forEach(row => {
      if(y > 270){doc.addPage(); y=20;}
      const fecha = row.querySelector('[style*="font-weight:500"]')?.textContent || '';
      const detalle = row.querySelector('[style*="font-size:.72rem"]')?.textContent || '';
      const monto = row.querySelector('[style*="Bebas"]')?.textContent || '';
      doc.text(fecha, 25, y);
      doc.text(detalle.replace(/[^\w\s\$]/g,'').trim(), 70, y);
      doc.text(monto, 175, y);
      y+=7;
    });
  } else {
    doc.setTextColor(0, 180, 80);
    doc.text('Sin deudas pendientes ✓', 25, y);
    doc.setTextColor(0,0,0);
  }
  
  doc.save('realfc-historial-' + userName.replace(/\s/g,'-') + '.pdf');
};
// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  STATE.session=session;
  STATE._initDone=false;
  if(session){const {data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();STATE.profile=data;}
  await render();
  STATE._initDone=true;

  // Solo re-renderizar en cambios reales de auth (login/logout), no en el evento inicial
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(!STATE._initDone) return;
    if(event==='SIGNED_IN'||event==='SIGNED_OUT'||event==='TOKEN_REFRESHED'){
      const prevId=STATE.session?.user?.id;
      STATE.session=session;
      if(session){
        if(session.user.id!==prevId){
          const {data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
          STATE.profile=data;
          await render();
        }
      } else {
        STATE.profile=null;
        await render();
      }
    }
  });

  // Fix 2: refrescar datos cuando la app vuelve a primer plano
  document.addEventListener('visibilitychange', async()=>{
    if(document.visibilityState==='visible' && STATE.session && STATE._initDone){
      const el=document.getElementById('tab-content');
      if(el) await renderTab();
    }
  });
}
init();

</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Real-FC/sw.js').then(reg => {
      // Verificar actualizaciones cada vez que se abre la app
      reg.update();
      // Cuando hay una nueva versión lista, recargar automáticamente
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if(newWorker.state === 'activated'){
            window.location.reload();
          }
        });
      });
    }).catch(err => console.log('SW error:', err));
  });
}
</script>
